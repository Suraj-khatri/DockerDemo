services:

  web:
    build: .
    container_name: dockerdemo

    ports:
      - "8080:8080"

    environment:
      - ASPNETCORE_URLS=http://+:8080

    depends_on:
      - sqlserver


  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: sqlserver

    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=manager@123

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql


volumes:
  sql_data: